{% extends "core/base.html" %}

{% block title %}Cash Back Calculator{% endblock %}
{% block meta_description %}Cash Back Calculator - Fast, accurate, and easy to use. Calculate online for free.{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">

    <div class="container">
        <h1>Cash Back Calculator</h1>
        <form id="calculatorForm">
                        <div class="form-group">
                <label for="purchase_amount_">Purchase Amount ($):</label>
                <input type="number" id="purchase_amount_" name="purchase_amount_" placeholder="Enter Purchase Amount ($)" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="cash_back_rate_">Cash Back Rate (%):</label>
                <input type="number" id="cash_back_rate_" name="cash_back_rate_" placeholder="Enter Cash Back Rate (%)" step="0.01" required>
            </div>

            <button type="submit">Calculate</button>
        </form>
        <div class="results" id="results">
            <div class="result-item">
                <span class="result-label">Result:</span>
                <span class="result-value" id="result">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calculatorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('result').textContent = '$0.00';
            document.getElementById('results').classList.add('show');
        });
    </script>

    </div>
</div>
{% endblock %}
