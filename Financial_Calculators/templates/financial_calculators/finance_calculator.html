{% extends "core/base.html" %}

{% block title %}Finance Calculator{% endblock %}
{% block meta_description %}Finance Calculator - Fast, accurate, and easy to use. Calculate online for free.{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">

    <div class="container">
        <h1>Finance Calculator</h1>
        <form id="calculatorForm">
                        <div class="form-group">
                <label for="amount_">Amount ($):</label>
                <input type="number" id="amount_" name="amount_" placeholder="Enter Amount ($)" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="rate_">Rate (%):</label>
                <input type="number" id="rate_" name="rate_" placeholder="Enter Rate (%)" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="time_years">Time (years):</label>
                <input type="number" id="time_years" name="time_years" placeholder="Enter Time (years)" step="0.01" required>
            </div>

            <button type="submit">Calculate</button>
        </form>
        <div class="results" id="results">
            <div class="result-item">
                <span class="result-label">Result:</span>
                <span class="result-value" id="result">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calculatorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('result').textContent = '$0.00';
            document.getElementById('results').classList.add('show');
        });
    </script>

    </div>
</div>
{% endblock %}
