{% extends "core/base.html" %}

{% block title %}Mortgage Calculator Uk{% endblock %}
{% block meta_description %}Mortgage Calculator Uk - Fast, accurate, and easy to use. Calculate online for free.{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">

    <div class="container">
        <h1>Mortgage Calculator Uk</h1>
        <form id="calculatorForm">
                        <div class="form-group">
                <label for="loan_amount_£">Loan Amount (£):</label>
                <input type="number" id="loan_amount_£" name="loan_amount_£" placeholder="Enter Loan Amount (£)" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="interest_rate_">Interest Rate (%):</label>
                <input type="number" id="interest_rate_" name="interest_rate_" placeholder="Enter Interest Rate (%)" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="loan_term_years">Loan Term (years):</label>
                <input type="number" id="loan_term_years" name="loan_term_years" placeholder="Enter Loan Term (years)" step="0.01" required>
            </div>

            <button type="submit">Calculate</button>
        </form>
        <div class="results" id="results">
            <div class="result-item">
                <span class="result-label">Result:</span>
                <span class="result-value" id="result">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calculatorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('result').textContent = '$0.00';
            document.getElementById('results').classList.add('show');
        });
    </script>

    </div>
</div>
{% endblock %}
