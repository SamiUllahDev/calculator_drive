{% extends "core/base.html" %}

{% block title %}Percent Off Calculator{% endblock %}
{% block meta_description %}Percent Off Calculator - Fast, accurate, and easy to use. Calculate online for free.{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">

    <div class="container">
        <h1>Percent Off Calculator</h1>
        <form id="calculatorForm">
                        <div class="form-group">
                <label for="original_price_">Original Price ($):</label>
                <input type="number" id="original_price_" name="original_price_" placeholder="Enter Original Price ($)" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="percent_off_">Percent Off (%):</label>
                <input type="number" id="percent_off_" name="percent_off_" placeholder="Enter Percent Off (%)" step="0.01" required>
            </div>

            <button type="submit">Calculate</button>
        </form>
        <div class="results" id="results">
            <div class="result-item">
                <span class="result-label">Result:</span>
                <span class="result-value" id="result">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calculatorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('result').textContent = '$0.00';
            document.getElementById('results').classList.add('show');
        });
    </script>

    </div>
</div>
{% endblock %}
