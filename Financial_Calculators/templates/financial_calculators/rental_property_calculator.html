{% extends "core/base.html" %}

{% block title %}Rental Property Calculator{% endblock %}
{% block meta_description %}Rental Property Calculator - Fast, accurate, and easy to use. Calculate online for free.{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">

    <div class="container">
        <h1>Rental Property Calculator</h1>
        <form id="calculatorForm">
                        <div class="form-group">
                <label for="property_price_">Property Price ($):</label>
                <input type="number" id="property_price_" name="property_price_" placeholder="Enter Property Price ($)" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="rental_income_">Rental Income ($):</label>
                <input type="number" id="rental_income_" name="rental_income_" placeholder="Enter Rental Income ($)" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="expenses_">Expenses ($):</label>
                <input type="number" id="expenses_" name="expenses_" placeholder="Enter Expenses ($)" step="0.01" required>
            </div>

            <button type="submit">Calculate</button>
        </form>
        <div class="results" id="results">
            <div class="result-item">
                <span class="result-label">Result:</span>
                <span class="result-value" id="result">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calculatorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('result').textContent = '$0.00';
            document.getElementById('results').classList.add('show');
        });
    </script>

    </div>
</div>
{% endblock %}
