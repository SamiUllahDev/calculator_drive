{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% trans "Calculator Drive" %}{% endblock %}</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #1f2937;
      background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 50%, #fae8ff 100%);
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      max-width: 40rem;
      width: 100%;
      background: rgba(255,255,255,0.85);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.6);
      text-align: center;
    }
    .card h1 {
      font-size: clamp(4rem, 15vw, 8rem);
      line-height: 1;
      margin: 0 0 1rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .card h2 { font-size: 1.5rem; margin: 0 0 1rem; }
    .card p { color: #4b5563; line-height: 1.6; margin: 0 0 1.5rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn-primary { color: #fff; background: linear-gradient(90deg, #2563eb, #4f46e5); }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid #e5e7eb; }
    .links { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb; }
    .links span { display: block; font-size: 0.875rem; color: #6b7280; margin-bottom: 0.75rem; }
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
    .tag {
      font-size: 0.875rem;
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      background: #eff6ff;
      color: #1d4ed8;
      text-decoration: none;
    }
    .tag.g { background: #f0fdf4; color: #15803d; }
    .tag.p { background: #faf5ff; color: #7c3aed; }
    .tag.a { background: #fffbeb; color: #b45309; }
    .foot { margin-top: 1.5rem; font-size: 0.75rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
