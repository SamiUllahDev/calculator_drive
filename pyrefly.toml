# Pyrefly type checker configuration
# This is a Django project — Pyrefly cannot fully understand Django's
# dynamic ORM (model managers, Q objects, etc.) without django-stubs.

[errors]
# Suppress false-positive parse errors from inline code extraction
parse-error = "ignore"

# Suppress false-positive unknown-name warnings (imports not visible in fragments)
unknown-name = "ignore"

# Suppress missing type-stubs warnings (django-stubs, types-bleach, etc.)
missing-module-source = "ignore"

# Suppress "no class attribute `objects`" — Django managers are added dynamically
no-attribute = "ignore"

# Suppress method override signature mismatches (common Django pattern)
bad-override = "ignore"

# Suppress operator errors (Django Q objects support | via __or__)
unsupported-operator = "ignore"

# Suppress overload resolution errors (dynamic settings values)
no-matching-overload = "ignore"

# Suppress not-callable errors from lazy proxy objects
not-callable = "ignore"
